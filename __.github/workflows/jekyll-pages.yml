---
# Workflow pour déployer Jekyll vers GitHub Pages
# Build depuis backend/app/ et déploie vers GitHub Pages

name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'backend/app/**'
      - '.github/workflows/jekyll-pages.yml'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Afficher le contexte (versions, env) dans le job summary'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll Site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Context debug (versions & env)
        if: ${{ github.event.inputs.debug == 'true' }}
        run: |
          echo "## Context debug" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruby | $(ruby --version 2>&1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: backend/app

      - name: Install dependencies
        working-directory: backend/app
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll site
        working-directory: backend/app
        run: |
          echo "🔨 Building Jekyll site depuis backend/app/..."
          bundle exec jekyll build --verbose
          echo "✅ Build completed successfully"
          echo "📁 Checking build output..."
          ls -la _site/ | head -10
        env:
          JEKYLL_ENV: production

      - name: Verify build output
        working-directory: ${{ github.workspace }}
        run: |
          echo "🔍 Verifying build output..."
          if [ ! -d "backend/app/_site" ]; then
            echo "❌ Error: _site directory not found!"
            exit 1
          fi
          if [ ! -f "backend/app/_site/index.html" ]; then
            echo "❌ Error: index.html not found in _site!"
            exit 1
          fi
          echo "✅ Build output verified"
          echo "📊 Build statistics:"
          find backend/app/_site -type f | wc -l | xargs echo "Total files:"
          du -sh backend/app/_site | xargs echo "Total size:"

      - name: Job summary (Build)
        working-directory: ${{ github.workspace }}
        run: |
          echo "## Jekyll Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruby | 3.1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | \`backend/app/_site\` |" >> $GITHUB_STEP_SUMMARY
          FILES=$(find backend/app/_site -type f 2>/dev/null | wc -l)
          SIZE=$(du -sh backend/app/_site 2>/dev/null | cut -f1)
          echo "| Files | $FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: backend/app/_site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Job summary (Deploy)
        if: always()
        run: |
          echo "## Deploy to GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> \
            $GITHUB_STEP_SUMMARY
