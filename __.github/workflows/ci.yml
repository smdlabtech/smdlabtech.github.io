---
# Workflow CI/CD Unifié pour la Plateforme Data & IA
# Regroupe: Tests, Lint, Build, Deploy

name: CI/CD Pipeline

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      debug:
        description: 'Enable debug context (versions, env) in job summary'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  RUBY_VERSION: '3.1'
  NODE_VERSION: '20'

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: Tests & Lint
  # ============================================
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Context debug (versions & env)
        if: ${{ github.event.inputs.debug == 'true' || env.ACTIONS_STEP_DEBUG == 'true' }}
        run: |
          echo "## Context debug" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | $(python3 --version 2>&1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY

      - name: Validate translations
        run: |
          chmod +x scripts/i18n/validate_translations.sh
          ./scripts/i18n/validate_translations.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/app/requirements.txt
          pip install -r backend/requirements-api.txt
          pip install pytest pytest-cov flake8 black isort pip-audit

      - name: Run linting
        run: |
          echo "🔍 Running flake8..."
          flake8 backend/app/src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

          echo "🔍 Checking code formatting with black..."
          black --check --diff backend/app/run.py backend/app/src

          echo "🔍 Checking imports with isort..."
          isort --check-only --diff backend/app/run.py backend/app/src

      - name: Dependency audit (Python)
        run: |
          echo "🔐 Auditing Python dependencies..."
          pip-audit -r backend/app/requirements.txt
          pip-audit -r backend/requirements-api.txt

      - name: Run tests (Flask app)
        id: pytest
        run: |
          echo "🧪 Running pytest (backend/app Flask)..."
          cd backend/app
          PYTHONPATH=${{ github.workspace }}/backend/app python -m pytest ../../tests/ -v \
            --ignore=../../tests/test_backend_fastapi.py \
            --cov=src --cov-report=xml --cov-report=html \
            -o cache_dir=/tmp/pytest_cache 2>&1 | tee ../../pytest-output.txt
        env:
          FLASK_ENV: testing

      - name: Run tests (Backend FastAPI)
        run: |
          echo "🧪 Running pytest (backend FastAPI)..."
          PYTHONPATH=${{ github.workspace }} python -m pytest tests/test_backend_fastapi.py -v

      # pytest-output.txt à la racine (tee ../../pytest-output.txt depuis backend/app/)
      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: success()
        with:
          files: backend/app/coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/app/htmlcov/

      - name: Job summary (Tests & Lint)
        if: always()
        run: |
          echo "## Tests & Lint Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ env.PYTHON_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | flake8, black, isort |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | pytest + coverage (incl. test_rate_limiting) |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifacts | test-results (htmlcov), pytest-output (on fail) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick links" >> $GITHUB_STEP_SUMMARY
          echo "- Flask legacy (tests): \`backend/app\`" >> $GITHUB_STEP_SUMMARY
          echo "- FastAPI (tests): \`backend/\`" >> $GITHUB_STEP_SUMMARY
          echo "- i18n gettext: \`backend/app/translations\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Run secret detection
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Job summary (Security)
        if: always()
        run: |
          echo "## Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Filesystem scan (CRITICAL,HIGH) |" >> $GITHUB_STEP_SUMMARY
          echo "| Trufflehog | Secret scan (verified only) |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 3: Build Jekyll (Frontend)
  # ============================================
  build-frontend:
    name: Build Jekyll
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: backend/app

      - name: Install dependencies
        working-directory: backend/app
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll site
        working-directory: backend/app
        run: |
          echo "🔨 Building Jekyll site..."
          bundle exec jekyll build --verbose
          echo "✅ Build completed"
        env:
          JEKYLL_ENV: production

      - name: Optimize assets
        run: |
          echo "🗜️ Optimizing assets..."
          find backend/app/_site -name "*.css" -exec echo "Processing {}" \;
          echo "📊 Build statistics:"
          find backend/app/_site -type f | wc -l | xargs echo "Total files:"
          du -sh backend/app/_site | xargs echo "Total size:"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: backend/app/_site

      - name: Job summary (Build Jekyll)
        if: always()
        run: |
          echo "## Build Frontend (Jekyll) Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruby | ${{ env.RUBY_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | \`backend/app/_site\` |" >> $GITHUB_STEP_SUMMARY
          FILES=$(find backend/app/_site -type f 2>/dev/null | wc -l)
          SIZE=$(du -sh backend/app/_site 2>/dev/null | cut -f1)
          echo "| Files | $FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 4: Build Docker (Backend)
  # ============================================
  build-backend:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image sous namespace de l'actor pour éviter "Create organization package" sur GHCR.
      # Cloud Run : rendre le package public (GitHub Packages > smdlabtech.github.io).
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.actor }}/smdlabtech.github.io
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/app
          file: ./backend/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.actor }}/smdlabtech.github.io:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Job summary (Build Backend)
        if: always()
        env:
          SUMMARY_IMAGE_TAG: ghcr.io/${{ github.actor }}/smdlabtech.github.io:${{ github.sha }}
        run: |
          echo "## Build Backend (Docker) Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`$SUMMARY_IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache | GHA |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 5: Deploy Frontend (GitHub Pages)
  # ============================================
  deploy-frontend:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## 🚀 Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 6: Deploy Backend (Cloud Run)
  # ============================================
  deploy-backend:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    environment: production

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      SERVICE_NAME: flask-portfolio
      REGION: ${{ vars.GCP_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Require GCP repository variables
        run: |
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ] || [ -z "${{ vars.GCP_REGION }}" ]; then
            MSG="Définissez GCP_PROJECT_ID et GCP_REGION (réglages Actions du dépôt, section Variables)."
            echo "::error::$MSG"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE="ghcr.io/${{ github.actor }}/smdlabtech.github.io:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${IMAGE}" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --timeout=300s \
            --cpu=1 \
            --memory=1Gi \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="FLASK_ENV=production,LOG_LEVEL=INFO" \
            --quiet

          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "🔍 Health check: ${URL}/health"

          for i in {1..10}; do
            if curl -f -s --max-time 10 "${URL}/health"; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting... ($i/10)"
            sleep 5
          done

          echo "❌ Health check failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Health:** ${{ steps.deploy.outputs.url }}/health" >> $GITHUB_STEP_SUMMARY
          echo "**Metrics:** ${{ steps.deploy.outputs.url }}/metrics" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 7: Notifications
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Prepare notification
        id: status
        run: |
          if [[ "${{ needs.deploy-frontend.result }}" == "success" && \
                "${{ needs.deploy-backend.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Deployment successful!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Deployment failed. Please check the logs." >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.message }}* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
